<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DeoHub</title>
    <script>
      // 1. Sync theme immediately before rendering to eliminate any bright white/dark flashes
      (function() {
        try {
          const theme = localStorage.getItem('theme') || 'dark';
          if (theme === 'dark') {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }

        // 2. Infinite Reload Loop Guard & Debouncing configuration
        const RELOAD_COOLDOWN = 3000; // 3 seconds
        const MAX_CONSECUTIVE_RELOADS = 4;
        const now = Date.now();
        
        try {
          const lastReload = sessionStorage.getItem('deo_last_reload_time');
          let consecutiveCount = parseInt(sessionStorage.getItem('deo_consecutive_reload_count') || '0', 10);

          if (lastReload) {
            const diff = now - parseInt(lastReload, 10);
            if (diff < RELOAD_COOLDOWN) {
              consecutiveCount += 1;
              sessionStorage.setItem('deo_consecutive_reload_count', consecutiveCount.toString());
            } else {
              sessionStorage.setItem('deo_consecutive_reload_count', '0');
              consecutiveCount = 0;
            }
          }
          
          sessionStorage.setItem('deo_last_reload_time', now.toString());

          if (consecutiveCount >= MAX_CONSECUTIVE_RELOADS) {
            console.error("Infinite reload loop blocked. Safeguard activated.");
            sessionStorage.setItem('deo_consecutive_reload_count', '0');
            window.isReloadLoopBlocked = true;
          }
        } catch (e) {
          console.warn("SessionStorage tracking setup handled:", e.message);
        }

        // 3. Expose robust, debounced smartReload action to the global context
        window.smartReload = function(force = false) {
          try {
            const nowTime = Date.now();
            const lastTrigger = sessionStorage.getItem('deo_last_reload_trigger') || '0';
            const gap = nowTime - parseInt(lastTrigger, 10);

            // Debounce: ignore multiple calls in a 2.5 second window
            if (gap < 2500 && !force) {
              console.warn("Reload request ignored: Debounced to prevent redundant reloads/flicks.");
              return;
            }

            sessionStorage.setItem('deo_last_reload_trigger', nowTime.toString());
            
            const labelEl = document.querySelector('#initial-splash-screen p');
            if (labelEl) {
              labelEl.textContent = 'Reloading context...';
            }

            const splash = document.getElementById('initial-splash-screen');
            if (splash) {
              splash.classList.remove('fade-out');
              splash.style.display = 'flex';
              splash.style.opacity = '1';
              splash.style.visibility = 'visible';
            }

            setTimeout(function() {
              window.location.reload();
            }, 300);
          } catch (e) {
            window.location.reload();
          }
        };
      })();
    </script>
    <style>
      /* Splash container styling */
      #initial-splash-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-family: system-ui, -apple-system, sans-serif;
        transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.4s;
      }
      
      /* Pure CSS background match prior to loaded stylesheets */
      html.dark #initial-splash-screen {
        background-color: #09090b; /* zinc-950 */
      }
      html:not(.dark) #initial-splash-screen {
        background-color: #fafafa; /* zinc-50 */
      }
      
      #initial-splash-screen.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      
      .bounce-dot {
        animation: splash-bounce 1.2s infinite ease-in-out;
      }
      
      @keyframes splash-bounce {
        0%, 100% { transform: translateY(0); opacity: 0.3; }
        50% { transform: translateY(-6px); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <!-- Infinite Loop-proof, immediate theme-correct splash screen -->
    <div id="initial-splash-screen">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 16px;">
        <!-- Beautiful animated logo frame -->
        <div style="position: relative; width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; border-radius: 20px; background-color: #7c3aed; box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.3);">
          <img 
            src="/logo.png" 
            style="width: 80px; height: 80px; border-radius: 20px; object-fit: cover; opacity: 0; transition: opacity 0.3s ease;" 
            alt="DeoHub Logo"
            onload="this.style.opacity='1'"
            onerror="this.style.display='none'; document.getElementById('splash-logo-fallback').style.display='flex';"
          />
          <div id="splash-logo-fallback" style="display: none; position: absolute; inset: 0; align-items: center; justify-content: center; border-radius: 20px; background-color: #7c3aed;">
            <!-- Simple SVG fallback representing Lucide Image Icon -->
            <svg style="width: 32px; height: 32px; color: white;" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
              <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
              <circle cx="9" cy="9" r="2"/>
              <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
            </svg>
          </div>
        </div>
        
        <!-- App Title and Loading Info -->
        <div style="text-align: center;">
          <h2 style="margin: 0; font-size: 24px; font-weight: 900; letter-spacing: -0.025em; color: #18181b;" class="dark:text-zinc-50">DeoHub</h2>
          <p style="margin: 6px 0 0 0; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.15em; color: #7c3aed;">
            Initializing workspace...
          </p>
        </div>
        
        <!-- Interactive loading dots indicator -->
        <div style="display: flex; align-items: center; gap: 4px; margin-top: 8px;">
          <span class="bounce-dot" style="width: 8px; height: 8px; border-radius: 50%; bg-color: currentColor; background-color: #7c3aed; animation-delay: 0ms"></span>
          <span class="bounce-dot" style="width: 8px; height: 8px; border-radius: 50%; bg-color: currentColor; background-color: #7c3aed; animation-delay: 150ms"></span>
          <span class="bounce-dot" style="width: 8px; height: 8px; border-radius: 50%; bg-color: currentColor; background-color: #7c3aed; animation-delay: 300ms"></span>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
